name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Python 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 패키지 설치
      run: |
        pip install pyinstaller playwright openai requests Pillow

    - name: Playwright 브라우저 전체 설치
      run: |
        playwright install chromium --with-deps
        playwright install chrome --with-deps

    - name: Chromium 경로 확인
      run: |
        python -c "
        import subprocess, sys
        result = subprocess.run(['playwright', 'install', '--list'], capture_output=True, text=True)
        print(result.stdout)
        import os
        base = os.path.expanduser('~/AppData/Local/ms-playwright')
        if os.path.exists(base):
            for root, dirs, files in os.walk(base):
                for f in files:
                    if 'chrome' in f.lower() and f.endswith('.exe'):
                        print(os.path.join(root, f))
        "

    - name: EXE 빌드 (Chromium 포함)
      run: |
        $ms_playwright = "$env:USERPROFILE\AppData\Local\ms-playwright"
        pyinstaller --onefile --windowed --name "QA_TC_Runner" `
          --hidden-import playwright `
          --hidden-import playwright.sync_api `
          --hidden-import openai `
          --hidden-import requests `
          --hidden-import tkinter `
          --hidden-import PIL `
          --hidden-import PIL.Image `
          --hidden-import PIL.ImageTk `
          --collect-all playwright `
          --add-data "$ms_playwright;ms-playwright" `
          qa_runner_gui.py

    - name: EXE 업로드
      uses: actions/upload-artifact@v4
      with:
        name: QA_TC_Runner_Windows
        path: dist/QA_TC_Runner.exe
        retention-days: 30
