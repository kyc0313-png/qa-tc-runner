name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Python 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 패키지 설치
      run: |
        pip install pyinstaller playwright openai requests Pillow

    - name: Playwright 브라우저 설치
      run: |
        playwright install chromium --with-deps

    - name: 버전 추출
      id: version
      shell: python
      run: |
        import re, os
        with open('qa_runner_gui.py', 'r', encoding='utf-8') as f:
            content = f.read()
        m = re.search(r"APP_VERSION\s*=\s*'([^']+)'", content)
        version = m.group(1) if m else '1.0'
        with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
            f.write(f'version={version}\n')
        print(f'Version: {version}')

    - name: EXE 빌드 (Chromium 포함)
      run: |
        $ms_playwright = "$env:USERPROFILE\AppData\Local\ms-playwright"
        pyinstaller --onefile --windowed --name "QA_TC_Runner" `
          --hidden-import playwright `
          --hidden-import playwright.sync_api `
          --hidden-import openai `
          --hidden-import requests `
          --hidden-import tkinter `
          --hidden-import PIL `
          --hidden-import PIL.Image `
          --hidden-import PIL.ImageTk `
          --collect-all playwright `
          --add-data "$ms_playwright;ms-playwright" `
          qa_runner_gui.py

    - name: GitHub Release 생성 및 EXE 업로드
      uses: ncipollo/release-action@v1
      with:
        tag: v${{ steps.version.outputs.version }}
        name: QA TC Runner v${{ steps.version.outputs.version }}
        body: |
          ## QA TC Runner v${{ steps.version.outputs.version }}

          ### How to install
          1. Download QA_TC_Runner.exe
          2. Run (if Windows Defender warning, click "More info -> Run anyway")

          ### Auto Update
          When running an older version, an update notification will appear.
        artifacts: dist/QA_TC_Runner.exe
        allowUpdates: true
        makeLatest: true
        token: ${{ secrets.GITHUB_TOKEN }}
